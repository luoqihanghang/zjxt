<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>网络智慧教务平台</title>
<link rel="stylesheet" href="styles.css" />
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="config.js"></script>
<script src="github-service.js"></script>
</head>
<body>

<!-- 登录页 -->
<div id="loginPage" class="login-page">
  <!-- 左侧科技展示区 -->
  <div class="login-left">
    <div class="login-left-bg-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
      <div class="shape shape-4"></div>
      <div class="shape shape-5"></div>
      <div class="grid-lines"></div>
    </div>
    <div class="login-left-content">
      <div class="login-logo-area">
        <div class="login-logo-ring"></div>
        <div class="login-logo-core">🎓</div>
      </div>
      <h1 class="login-left-title">鄂伦春自治旗大杨树第一中学</h1>
      <h1 class="login-left-title">智慧教务平台</h1>
      <p class="login-left-sub">SMART EDUCATIONAL ADMINISTRATION</p>
      <div class="login-divider"></div>
      <div class="login-features-grid">
        <div class="lf-item"><span class="lf-dot"></span><span>成绩智能分析</span></div>
        <div class="lf-item"><span class="lf-dot"></span><span>教师排行榜</span></div>
        <div class="lf-item"><span class="lf-dot"></span><span>多维数据对比</span></div>
        <div class="lf-item"><span class="lf-dot"></span><span>权限分级管理</span></div>
      </div>
    </div>
  </div>

  <!-- 右侧登录表单 -->
  <div class="login-right">
    <div class="login-box">
      <div class="login-brand-row">
        <div class="login-brand-icon">🎓</div>
        <span class="login-brand-text">网络智慧教务</span>
      </div>

      <div class="login-form-title">欢迎登录</div>
      <div class="login-form-desc">请输入账号信息登录系统</div>

      <div class="login-fields">
        <div class="field-group">
          <span class="field-icon">👤</span>
          <input type="text" id="loginUsername" placeholder="账号" autocomplete="off" />
        </div>
        <div class="field-group">
          <span class="field-icon">🔒</span>
          <input type="password" id="loginPassword" placeholder="密码" />
        </div>
        <div class="field-group">
          <span class="field-icon">🎭</span>
          <select id="loginRole">
            <option value="admin">管理员</option>
            <option value="academic">教务老师</option>
            <option value="teacher">任课教师</option>
            <option value="headteacher">班主任</option>
          </select>
        </div>
      </div>

      <div class="login-options">
        <label class="remember-me">
          <input type="checkbox" id="rememberMe" />
          <span>记住密码</span>
        </label>
      </div>

      <button id="loginBtn" class="login-btn">登 录</button>
      <div id="loginError" class="login-error"></div>

      <div class="login-footer">© 2026 网络智慧教务平台 · 大一中</div>
    </div>
  </div>
</div>

<!-- 主界面 -->
<div id="mainApp" class="main-app hidden">
  <!-- 左侧导航 -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">🎓</div>
      <div class="brand">
        <div class="brand-title">智慧教务</div>
        <div class="brand-sub">Smart Edu Platform</div>
      </div>
    </div>
    <nav id="navMenu" class="nav-menu"></nav>
    <div class="sidebar-footer">
      <div id="currentUserInfo" class="user-info"></div>
      <button id="logoutBtn" class="btn-logout">退出登录</button>
    </div>
  </aside>

  <!-- 右侧内容 -->
  <main class="content">
    <header class="topbar">
      <div class="topbar-left">
        <h2 id="pageTitle">首页</h2>
      </div>
      <div class="topbar-right">
        <div id="announcementBadge" class="announcement-badge hidden">
          📢 <span id="announcementCount">0</span> 条新公告
        </div>
        <div id="topUserInfo"></div>
      </div>
    </header>

    <!-- 消息播报滚动条 -->
    <div id="announcementBar" class="announcement-bar hidden">
      <span class="ab-icon">📢 播报：</span>
      <div id="announcementContent" class="ab-content"></div>
    </div>

    <!-- 页面内容容器 -->
    <section id="pageContent" class="page-content"></section>
  </main>
</div>

<!-- 模态框 -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle">提示</h3>
      <button id="modalClose" class="modal-close">×</button>
    </div>
    <div id="modalBody" class="modal-body"></div>
    <div id="modalFooter" class="modal-footer">
      <button id="modalOk" class="btn-primary">确定</button>
    </div>
  </div>
</div>

<!-- Toast 提示 -->
<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
